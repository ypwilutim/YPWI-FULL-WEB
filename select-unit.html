<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Unit - YPWI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <img src="assets/images/YPWI LOGO HITAM.png" alt="YPWI" height="50" class="mx-auto mb-4">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Selamat Datang!</h1>
            <p class="text-gray-600">Pilih unit sekolah yang ingin Anda akses</p>
        </div>

        <!-- User Info -->
        <div class="bg-white rounded-2xl p-6 shadow-lg mb-6">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white font-bold text-xl">
                    <span id="userInitial">U</span>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-gray-800" id="userName">Nama User</h3>
                    <p class="text-gray-600 text-sm" id="userRole">Role User</p>
                </div>
            </div>
            <div class="bg-blue-50 rounded-lg p-4">
                <p class="text-blue-800 text-sm">
                    <i class="bi bi-info-circle me-2"></i>
                    Anda memiliki akses ke <span id="unitCount">0</span> unit sekolah. Pilih unit yang ingin Anda kelola.
                </p>
            </div>
        </div>

        <!-- Unit Selection -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h3 class="font-bold text-xl mb-6 text-gray-800">Pilih Unit Sekolah</h3>
            <div id="unitGrid" class="grid gap-4">
                <!-- Units will be loaded here -->
            </div>
        </div>

        <!-- Logout -->
        <div class="text-center mt-8">
            <button onclick="logout()" class="text-gray-500 hover:text-gray-700 text-sm">
                <i class="bi bi-box-arrow-right me-2"></i>Keluar
            </button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Decode token to get user info
        const payload = JSON.parse(atob(token.split('.')[1]));
        const accessibleUnits = payload.accessible_units || [];
        const userRole = payload.role;
        const userName = localStorage.getItem('userName') || 'User';

        // Display user info
        document.getElementById('userName').textContent = userName;
        document.getElementById('userRole').textContent = userRole;
        document.getElementById('userInitial').textContent = userName.charAt(0).toUpperCase();
        document.getElementById('unitCount').textContent = accessibleUnits.length;

        async function loadUnits() {
            try {
                const response = await fetch('/api/tenants');
                const tenants = await response.json();

                const unitGrid = document.getElementById('unitGrid');

                // Filter only accessible units
                const accessibleTenants = tenants.filter(tenant => accessibleUnits.includes(tenant.code));

                if (accessibleTenants.length === 0) {
                    unitGrid.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="bi bi-exclamation-triangle text-4xl mb-4"></i>
                            <p>Tidak ada unit yang dapat diakses</p>
                        </div>
                    `;
                    return;
                }

                unitGrid.innerHTML = accessibleTenants.map(tenant => `
                    <div class="border border-gray-200 rounded-xl p-4 hover:border-primary hover:shadow-md transition cursor-pointer"
                         onclick="selectUnit('${tenant.code}', '${tenant.name}')">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center">
                                <i class="bi bi-building text-primary text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-800">${tenant.name}</h4>
                                <p class="text-gray-600 text-sm">Kode: ${tenant.code}</p>
                            </div>
                            <div class="text-primary">
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading units:', error);
                document.getElementById('unitGrid').innerHTML = `
                    <div class="text-center py-8 text-red-500">
                        <i class="bi bi-exclamation-triangle text-4xl mb-4"></i>
                        <p>Error loading units</p>
                    </div>
                `;
            }
        }

        function selectUnit(unitCode, unitName) {
            // Store selected unit
            localStorage.setItem('selectedUnit', unitCode);
            localStorage.setItem('selectedUnitName', unitName);

            // Check if user has multiple roles in this unit
            checkMultipleRoles(unitCode);
        }

        async function checkMultipleRoles(unitCode) {
            try {
                // Get teacher data to check roles in this unit
                const teacherId = payload.id;
                const response = await fetch(`/api/teacher-data/${teacherId}`);
                const teacherData = await response.json();

                // Parse jabatan to get all roles
                const jabatanString = teacherData.jabatan || '';
                const jabatanArray = jabatanString.split(',').map(j => j.trim().toLowerCase());

                // Define role mappings
                const roleMappings = {
                    'walikelas': 'Guru',
                    'mapel': 'Guru',
                    'mengaji': 'Guru',
                    'guru': 'Guru',
                    'bendahara': 'Bendahara',
                    'admin': 'Admin',
                    'tu': 'Admin',
                    'operator': 'Admin',
                    'kepala sekolah': 'KepalaSekolah',
                    'ketua': 'KetuaYayasan'
                };

                // Get unique roles for this unit
                const rolesInUnit = [...new Set(jabatanArray.map(j => roleMappings[j]).filter(Boolean))];

                if (rolesInUnit.length <= 1) {
                    // Single role - redirect directly to appropriate dashboard
                    redirectToDashboard(rolesInUnit[0] || 'Guru', unitCode);
                } else {
                    // Multiple roles - go to role selection
                    window.location.href = `select-role.html?unit=${unitCode}`;
                }

            } catch (error) {
                console.error('Error checking roles:', error);
                // Default to Guru dashboard
                redirectToDashboard('Guru', unitCode);
            }
        }

        function redirectToDashboard(role, unitCode) {
            // Update current tenant
            localStorage.setItem('tenant', unitCode);

            switch(role) {
                case 'AdminYayasan':
                case 'AdminSekolah':
                    window.location.href = 'admin/pusat/dashboard.html';
                    break;
                case 'BendaharaYayasan':
                case 'BendaharaSekolah':
                    window.location.href = 'bendahara/pusat/index.html';
                    break;
                case 'KetuaYayasan':
                case 'KepalaSekolah':
                    window.location.href = 'kepala-sekolah/index.html';
                    break;
                case 'Guru':
                default:
                    window.location.href = 'guru/index.html';
                    break;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Initialize
        loadUnits();
    </script>
</body>
</html>
