<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Berita - YPWI Luwu Timur</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #93d5f4;
            --deep-green: #1f8a4a;
            --bright-yellow: #eae830;
            --soft-bg: #f8fdff;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #2d3436; 
            background-color: var(--soft-bg);
        }

        .navbar { 
            background-color: rgba(147, 213, 244, 0.95) !important; 
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--bright-yellow);
            padding: 15px 0;
        }
        .navbar-brand { font-weight: 800; color: var(--deep-green) !important; font-size: 1.5rem; }
        .nav-link { color: #064e3b !important; font-weight: 600; padding: 0 15px !important; }

        .form-container { padding: 50px 0; }
        .form-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(147, 213, 244, 0.25);
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .form-title {
            color: var(--deep-green);
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 15px;
            padding: 15px;
            border: 2px solid var(--primary-blue);
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: var(--deep-green);
            box-shadow: 0 0 0 0.2rem rgba(31, 138, 74, 0.25);
        }
        .btn-submit {
            background-color: var(--deep-green);
            color: white;
            border-radius: 50px;
            padding: 15px;
            font-weight: 800;
            width: 100%;
            border: 2px solid var(--bright-yellow);
        }
        .btn-submit:hover {
            background-color: var(--bright-yellow);
            color: var(--deep-green);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                <img src="../assets/images/YPWI LOGO HITAM.png" alt="YPWI" height="20">
                <span style="color: #1f8a4a; font-weight: 800;">LUTIM</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="post-berita.html">Post Berita</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="form-container">
        <div class="container">
            <div class="form-card">
                <h2 class="form-title">Post Berita Baru</h2>
                <form>
                    <div class="mb-3">
                        <label for="judul" class="form-label">Judul Berita</label>
                        <input type="text" class="form-control" id="judul" required>
                    </div>
                    <div class="mb-3">
                        <label for="kategori" class="form-label">Kategori</label>
                        <select class="form-select" id="kategori" required>
                            <option value="">Pilih Kategori</option>
                            <option value="pendidikan">Pendidikan</option>
                            <option value="kegiatan">Kegiatan</option>
                            <option value="prestasi">Prestasi</option>
                            <option value="sosial">Sosial</option>
                            <option value="umum">Umum</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="gambar" class="form-label">Gambar Utama</label>
                        <input type="file" class="form-control" id="gambar" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label for="isi" class="form-label">Isi Berita</label>
                        <textarea class="form-control" id="isi" rows="10" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="penulis" class="form-label">Penulis</label>
                        <input type="text" class="form-control" id="penulis" required>
                    </div>
                    <button type="submit" class="btn btn-submit">Post Berita</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
