<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulis Artikel - YPWI Blog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1f8a4a', secondary: '#93d5f4', accent: '#eae830', dark: '#0f172a' },
                    fontFamily: { plus: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
        window.tailwind = window.tailwind || {};
        window.tailwind.config = window.tailwind.config || {};
        window.tailwind.config.disableProductionWarning = true;
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="/index.html" class="flex items-center gap-3">
                    <i class="bi bi-arrow-left text-white text-xl"></i>
                    <span class="text-xl font-extrabold text-white">YPWI <span class="text-accent">Blog</span></span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h1 class="text-2xl font-extrabold text-gray-800 mb-6">
                <i class="bi bi-pencil-square text-primary me-2"></i>Tulis Artikel Baru
            </h1>
            
            <form id="articleForm" class="space-y-6">
                <!-- Title -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Judul Artikel</label>
                    <input type="text" id="title" name="title" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition"
                        placeholder="Contoh: Tips Membantu Anak Menghafal Al-Qur'an">
                </div>
                
                <!-- Category -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Kategori</label>
                    <select id="category" name="category"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary outline-none transition">
                        <option value="pendidikan">Pendidikan</option>
                        <option value="keluarga">Keluarga</option>
                        <option value="agama">Agama</option>
                        <option value="kesehatan">Kesehatan</option>
                        <option value="inspirasi">Inspirasi</option>
                        <option value="tips">Tips & Trik</option>
                        <option value="blog">Artikel Pribadi</option>
                    </select>
                </div>
                
                <!-- Content -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Konten Artikel</label>
                    <textarea id="content" name="content" rows="12" required
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition resize-none"
                        placeholder="Tulis artikel Anda di sini...&#10;&#10;Tips:&#10;- Gunakan paragraf untuk memudahkan bacaan&#10;- Bagikan pengalaman atau pengetahuan Anda&#10;- Jangan lupa doa dan hamdalah"></textarea>
                    <p class="text-xs text-gray-400 mt-2">Minimal 100 karakter</p>
                </div>
                
                <!-- Image URL (optional) -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">URL Gambar (Opsional)</label>
                    <input type="url" id="image" name="image"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary outline-none transition"
                        placeholder="https://contoh.com/gambar.jpg">
                </div>
                
                <!-- Submit -->
                <div class="flex gap-4">
                    <button type="submit" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold hover:bg-green-700 transition flex items-center justify-center gap-2">
                        <i class="bi bi-send"></i> Publikasi
                    </button>
                    <button type="button" onclick="window.location.href='/index.html#blog'" class="px-6 py-3 rounded-xl border-2 border-gray-200 font-semibold text-gray-600 hover:bg-gray-50 transition">
                        Batal
                    </button>
                </div>
            </form>
            
            <!-- Success Message -->
            <div id="successMessage" class="hidden mt-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-xl">
                <i class="bi bi-check-circle me-2"></i>
                Artikel berhasil dipublikasi! <a href="/index.html#blog" class="underline font-bold">Lihat di halaman utama</a>
            </div>
        </div>
        
        <!-- My Articles -->
        <div class="bg-white rounded-2xl shadow-lg p-8 mt-6">
            <h2 class="text-xl font-extrabold text-gray-800 mb-4">
                <i class="bi bi-journal-text text-primary me-2"></i>Artikel Saya
            </h2>
            <div id="myArticles" class="space-y-4">
                <p class="text-gray-500">Memuat...</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('role');
        
        // Check if logged in
        if (!token) {
            alert('Silakan login terlebih dahulu untuk menulis artikel');
            window.location.href = '/login.html';
        }
        
        // Get author name from localStorage or API
        let authorName = 'Guru YPWI';
        const userName = localStorage.getItem('user_name');
        if (userName) authorName = userName;
        
        // Submit article
        document.getElementById('articleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;
            const image = document.getElementById('image').value;
            
            if (content.length < 100) {
                alert('Konten minimal 100 karakter');
                return;
            }
            
            try {
                const res = await fetch('/api/news', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        title, 
                        content, 
                        category: 'blog', // Force as blog
                        author: authorName,
                        image 
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('successMessage').classList.remove('hidden');
                    document.getElementById('articleForm').reset();
                    loadMyArticles();
                } else {
                    alert('Gagal mempublikasi: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
        
        // Load my articles
        async function loadMyArticles() {
            try {
                const res = await fetch('/api/blog');
                const articles = await res.json();
                
                // Filter for current author (if we have author info)
                const container = document.getElementById('myArticles');
                
                if (articles.length === 0) {
                    container.innerHTML = '<p class="text-gray-500">Anda belum memiliki artikel.</p>';
                    return;
                }
                
                container.innerHTML = articles.slice(0, 5).map(article => `
                    <div class="border-b pb-4">
                        <h3 class="font-bold text-gray-800">${article.title}</h3>
                        <p class="text-sm text-gray-500">${article.content.substring(0, 80)}...</p>
                        <div class="flex items-center gap-4 mt-2 text-xs text-gray-400">
                            <span><i class="bi bi-calendar"></i> ${new Date(article.created_at).toLocaleDateString('id-ID')}</span>
                            <span class="px-2 py-1 bg-primary/10 text-primary rounded">${article.category}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        
        loadMyArticles();
    </script>
</body>
</html>
