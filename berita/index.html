<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berita & Blog - YPWI Management</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1f8a4a', secondary: '#93d5f4', accent: '#eae830', dark: '#0f172a' },
                    fontFamily: { plus: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
        window.tailwind = window.tailwind || {};
        window.tailwind.config = window.tailwind.config || {};
        window.tailwind.config.disableProductionWarning = true;
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="../index.html" class="flex items-center gap-3">
                    <i class="bi bi-arrow-left text-white text-xl"></i>
                    <span class="text-xl font-extrabold text-white">Berita & Blog</span>
                </a>
                <div class="flex items-center gap-4">
                    <span class="text-white font-semibold">Dashboard Berita</span>
                    <button onclick="logout()" class="text-white hover:text-accent">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <!-- Card: Tulis Artikel -->
            <div class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all">
                <div class="text-center">
                    <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="bi bi-pencil-square text-white text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Tulis Artikel</h3>
                    <p class="text-gray-600 mb-4">Buat artikel berita atau blog baru</p>
                    <a href="blog.html" class="inline-block bg-primary text-white px-6 py-3 rounded-xl font-semibold hover:bg-green-700 transition">
                        Mulai Menulis
                    </a>
                </div>
            </div>

            <!-- Card: Kelola Berita -->
            <div class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all">
                <div class="text-center">
                    <div class="w-16 h-16 bg-secondary rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="bi bi-newspaper text-primary text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Kelola Berita</h3>
                    <p class="text-gray-600 mb-4">Edit dan kelola artikel yang sudah dipublikasikan</p>
                    <button onclick="manageNews()" class="inline-block bg-secondary text-primary px-6 py-3 rounded-xl font-semibold hover:bg-blue-100 transition">
                        Kelola Berita
                    </button>
                </div>
            </div>

            <!-- Card: Statistik -->
            <div class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all">
                <div class="text-center">
                    <div class="w-16 h-16 bg-accent rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="bi bi-graph-up text-primary text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Statistik</h3>
                    <p class="text-gray-600 mb-4">Lihat statistik pembacaan dan engagement</p>
                    <button onclick="viewStats()" class="inline-block bg-accent text-primary px-6 py-3 rounded-xl font-semibold hover:bg-yellow-100 transition">
                        Lihat Statistik
                    </button>
                </div>
            </div>
        </div>

        <!-- Recent Articles -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Artikel Terbaru</h2>
                <button onclick="loadAllArticles()" class="text-primary hover:text-green-700 font-semibold">
                    Lihat Semua
                </button>
            </div>
            <div id="recent-articles" class="space-y-4">
                <div class="text-center py-8 text-gray-400">
                    <i class="bi bi-newspaper text-4xl mb-4"></i>
                    <p>Loading articles...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        // Load recent articles
        fetch('/api/news?limit=5', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(articles => {
            const container = document.getElementById('recent-articles');
            if (articles.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="bi bi-newspaper text-4xl mb-4"></i><p>Belum ada artikel</p></div>';
            } else {
                container.innerHTML = articles.map(article => `
                    <div class="border border-gray-200 rounded-xl p-4 hover:bg-gray-50">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h4 class="font-bold text-lg text-gray-800 mb-2">${article.title}</h4>
                                <p class="text-gray-600 text-sm mb-2">${article.content.substring(0, 150)}...</p>
                                <div class="flex items-center gap-4 text-xs text-gray-500">
                                    <span><i class="bi bi-person"></i> ${article.author}</span>
                                    <span><i class="bi bi-calendar"></i> ${new Date(article.created_at).toLocaleDateString('id-ID')}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editArticle(${article.id})" class="text-blue-500 hover:text-blue-700">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button onclick="deleteArticle(${article.id})" class="text-red-500 hover:text-red-700">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        })
        .catch(err => {
            console.error('Error loading articles:', err);
            document.getElementById('recent-articles').innerHTML = '<div class="text-center py-8 text-red-400"><i class="bi bi-exclamation-triangle text-4xl mb-4"></i><p>Error loading articles</p></div>';
        });

        function manageNews() {
            alert('Fitur kelola berita akan diimplementasi');
        }

        function viewStats() {
            alert('Fitur statistik akan diimplementasi');
        }

        function loadAllArticles() {
            window.location.href = '../news.html'; // Assuming there's a news page
        }

        function editArticle(id) {
            window.location.href = `blog.html?edit=${id}`;
        }

        function deleteArticle(id) {
            if (confirm('Yakin hapus artikel ini?')) {
                fetch(`/api/news/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('Gagal menghapus artikel');
                    }
                })
                .catch(err => alert('Error: ' + err.message));
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('tenant');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
