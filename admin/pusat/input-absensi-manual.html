<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Absensi Manual - YPWI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1f8a4a', secondary: '#93d5f4', accent: '#eae830', dark: '#0f172a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="dashboard.html" class="text-white text-xl font-extrabold">YPWI <span class="text-accent">Admin</span></a>
                </div>
                <div class="flex items-center gap-4">
                    <a href="laporan-absensi.html" class="text-white/80 hover:text-white text-sm">← Laporan</a>
                    <button onclick="logout()" class="text-white/80 hover:text-white"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h1 class="text-2xl font-extrabold text-gray-800 mb-6">
                <i class="bi bi-plus-circle text-primary me-2"></i>Input Absensi Manual
            </h1>
            
            <form id="manualForm" class="space-y-6">
                <!-- Pilih Jenis -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Jenis Penginputan</label>
                    <select id="jenis-input" onchange="togglePilihNama()" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none">
                        <option value="nama">Input by Nama</option>
                        <option value="manual">Input Manual Lengkap</option>
                    </select>
                </div>

                <!-- Pilih Nama (dynamic) -->
                <div id="pilih-nama-section">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Pilih Nama</label>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-500">Unit</label>
                            <select id="pilih-unit" onchange="loadPersonel()" class="w-full px-4 py-2 border rounded-lg">
                                <option value="">Pilih Unit</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-gray-500">Nama</label>
                            <select id="pilih-nama" class="w-full px-4 py-2 border rounded-lg">
                                <option value="">Pilih Nama</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Manual Fields -->
                <div id="manual-section" class="hidden space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap</label>
                            <input type="text" id="nama" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none" placeholder="Nama lengkap">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Unit Sekolah</label>
                            <select id="asal-sekolah" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none">
                                <option value="">Pilih Unit</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Tanggal & Jam -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tanggal</label>
                        <input type="date" id="tanggal" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Jam</label>
                        <input type="time" id="jam" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none">
                    </div>
                </div>

                <!-- Status -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Status Absensi</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary">
                            <input type="radio" name="status" value="Datang" class="w-5 h-5 text-primary">
                            <span class="font-semibold">Datang</span>
                        </label>
                        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary">
                            <input type="radio" name="status" value="Pulang" class="w-5 h-5 text-blue-600">
                            <span class="font-semibold">Pulang</span>
                        </label>
                    </div>
                </div>

                <!-- Keterangan -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Keterangan</label>
                    <select id="keterangan" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary outline-none">
                        <option value="Hadir">Hadir</option>
                        <option value="Terlambat">Terlambat</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Izin">Izin</option>
                        <option value="Dinas Luar">Dinas Luar</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                    </select>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-green-700 transition flex items-center justify-center gap-2">
                    <i class="bi bi-check-circle"></i> Simpan Absensi
                </button>
            </form>

            <!-- Success -->
            <div id="success-msg" class="hidden mt-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-xl">
                <i class="bi bi-check-circle me-2"></i> Absensi berhasil disimpan!
            </div>
        </div>

        <!-- Riwayat Input Hari Ini -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mt-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Riwayat Input Hari Ini</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left">Nama</th>
                            <th class="px-4 py-2 text-left">Unit</th>
                            <th class="px-4 py-2 text-center">Status</th>
                            <th class="px-4 py-2 text-center">Jam</th>
                            <th class="px-4 py-2 text-left">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="riwayat-table">
                        <tr><td colspan="5" class="text-center py-4 text-gray-500">Memuat...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        // Set default date
        document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
        document.getElementById('jam').value = new Date().toTimeString().slice(0,5);

        // Load units
        async function loadUnits() {
            const res = await fetch('/api/tenants');
            const units = await res.json();
            
            const selects = ['pilih-unit', 'asal-sekolah'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                units.forEach(u => {
                    sel.innerHTML += `<option value="${u.code}">${u.name}</option>`;
                });
            });
        }
        loadUnits();

        function togglePilihNama() {
            const jenis = document.getElementById('jenis-input').value;
            document.getElementById('pilih-nama-section').classList.toggle('hidden', jenis === 'manual');
            document.getElementById('manual-section').classList.toggle('hidden', jenis !== 'manual');
        }

        async function loadPersonel() {
            const unit = document.getElementById('pilih-unit').value;
            if (!unit) return;
            
            const res = await fetch('/api/tenants/' + unit);
            // Load from teachers endpoint
            const teacherRes = await fetch('/api/all-teachers');
            const teachers = await teacherRes.json();
            
            const filtered = teachers.filter(t => t.tenant_id === unit);
            const select = document.getElementById('pilih-nama');
            select.innerHTML = '<option value="">Pilih Nama</option>';
            filtered.forEach(t => {
                select.innerHTML += `<option value="${t.nama}" data-jabatan="${t.jabatan || ''}">${t.nama}</option>`;
            });
        }

        // Submit
        document.getElementById('manualForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jenis = document.getElementById('jenis-input').value;
            let nama, asal_sekolah, jabatan;
            
            if (jenis === 'nama') {
                const selected = document.getElementById('pilih-nama');
                const opt = selected.options[selected.selectedIndex];
                nama = selected.value;
                asal_sekolah = document.getElementById('pilih-unit').value;
                jabatan = opt.dataset.jabatan || '';
            } else {
                nama = document.getElementById('nama').value;
                asal_sekolah = document.getElementById('asal-sekolah').value;
                jabatan = '';
            }
            
            if (!nama || !asal_sekolah) {
                alert('Mohon lengkapi semua field');
                return;
            }

            const status = document.querySelector('input[name="status"]:checked')?.value || 'Datang';
            
            try {
                const res = await fetch('/api/attendance-manual', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        nama,
                        asal_sekolah,
                        tanggal: document.getElementById('tanggal').value,
                        jam: document.getElementById('jam').value,
                        status,
                        keterangan: document.getElementById('keterangan').value
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById('success-msg').classList.remove('hidden');
                    document.getElementById('manualForm').reset();
                    loadRiwayat();
                } else {
                    alert('Gagal: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        // Load riwayat
        async function loadRiwayat() {
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`/api/attendance-detail?bulan=${today.slice(5,7)}&tahun=${today.slice(0,4)}&unit=all`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            const todayData = data.filter(d => d.tanggal === today && d.jenis_absen === 'manual');
            const tbody = document.getElementById('riwayat-table');
            
            if (todayData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">Belum ada input manual hari ini</td></tr>';
            } else {
                tbody.innerHTML = todayData.map(d => `
                    <tr class="border-b">
                        <td class="px-4 py-2 font-medium">${d.nama}</td>
                        <td class="px-4 py-2 text-sm text-gray-500">${d.asal_sekolah}</td>
                        <td class="px-4 py-2 text-center"><span class="px-2 py-1 rounded text-xs font-bold ${d.status === 'Datang' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${d.status}</span></td>
                        <td class="px-4 py-2 text-center text-sm">${d.jam}</td>
                        <td class="px-4 py-2 text-sm text-gray-500">${d.keterangan}</td>
                    </tr>
                `).join('');
            }
        }
        loadRiwayat();

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
