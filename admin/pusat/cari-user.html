<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari User - YPWI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="gradient-bg shadow-xl">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="../assets/images/YPWI LOGO HITAM.png" alt="YPWI" height="30">
                    <span class="text-2xl font-extrabold text-white">YPWI <span class="text-accent">LUTIM</span></span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="dashboard.html" class="text-white/80 hover:text-white font-semibold">← Kembali ke Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">
            <i class="bi bi-search text-primary me-2"></i>Cari User
        </h1>
        <p class="text-gray-500 mb-6">Cari dan kelola data user di sistem YPWI</p>

        <!-- Search Form -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="grid md:grid-cols-4 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Cari Nama/Email/NIY</label>
                    <input type="text" id="searchQuery" placeholder="Masukkan nama, email, atau NIY..."
                           class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Unit Sekolah</label>
                    <select id="searchTenant" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary">
                        <option value="">Semua Unit</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Tipe User</label>
                    <select id="searchType" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary">
                        <option value="">Semua Tipe</option>
                        <option value="teacher">Guru</option>
                        <option value="user">User Sistem</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="searchUsers()" class="w-full bg-primary text-white py-2 px-6 rounded-lg font-bold hover:bg-green-700 transition">
                        <i class="bi bi-search me-2"></i>Cari
                    </button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h3 class="text-xl font-bold mb-4">Hasil Pencarian</h3>
            <div id="resultsTable">
                <div class="text-center py-8 text-gray-500">
                    <i class="bi bi-search text-4xl mb-4"></i>
                    <p>Masukkan kriteria pencarian untuk menemukan user</p>
                </div>
            </div>
        </div>
    </div>

    <!-- User Detail Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detail User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="userDetail"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; }

        // Load tenants
        async function loadTenants() {
            try {
                const res = await fetch('/api/tenants');
                const tenants = await res.json();
                const select = document.getElementById('searchTenant');
                tenants.forEach(tenant => {
                    const option = document.createElement('option');
                    option.value = tenant.code;
                    option.textContent = tenant.name;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading tenants:', err);
            }
        }

        // Search users
        async function searchUsers() {
            const query = document.getElementById('searchQuery').value.trim();
            const tenant = document.getElementById('searchTenant').value;
            const type = document.getElementById('searchType').value;

            if (!query && !tenant && !type) {
                alert('Masukkan minimal satu kriteria pencarian!');
                return;
            }

            try {
                let url = `/api/search-users?`;
                if (query) url += `query=${encodeURIComponent(query)}&`;
                if (tenant) url += `tenant_id=${encodeURIComponent(tenant)}&`;
                if (type) url += `role=${encodeURIComponent(type)}&`;

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const users = await res.json();
                displayResults(users);

            } catch (err) {
                console.error('Search error:', err);
                document.getElementById('resultsTable').innerHTML = `
                    <div class="text-center py-8 text-red-500">
                        <i class="bi bi-exclamation-triangle text-4xl mb-4"></i>
                        <p>Error: ${err.message}</p>
                    </div>
                `;
            }
        }

        function displayResults(users) {
            const table = document.getElementById('resultsTable');

            if (users.length === 0) {
                table.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="bi bi-info-circle text-4xl mb-4"></i>
                        <p>Tidak ada user ditemukan dengan kriteria tersebut</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b bg-gray-50">
                                <th class="p-3">Nama/Username</th>
                                <th class="p-3">Email</th>
                                <th class="p-3">Unit</th>
                                <th class="p-3">Jabatan</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            users.forEach(user => {
                const statusClass = user.status_aktif === 'Aktif' ? 'text-green-600' : 'text-red-600';
                const statusIcon = user.status_aktif === 'Aktif' ? 'bi-check-circle' : 'bi-x-circle';

                html += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-semibold">
                            <div class="flex items-center gap-2">
                                <i class="bi ${user.type === 'teacher' ? 'bi-person-badge' : 'bi-person'} text-primary"></i>
                                ${user.username}
                            </div>
                        </td>
                        <td class="p-3">${user.email || '-'}</td>
                        <td class="p-3">
                            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">
                                ${user.tenant_id || 'YPWI Pusat'}
                            </span>
                        </td>
                        <td class="p-3">
                            ${user.jabatan || user.role || '-'}
                            ${user.sebagai ? `(${user.sebagai})` : ''}
                        </td>
                        <td class="p-3">
                            <span class="${statusClass}">
                                <i class="bi ${statusIcon} me-1"></i>
                                ${user.status_aktif}
                            </span>
                        </td>
                        <td class="p-3">
                            <button onclick="viewUserDetail('${user.type}', ${user.id})"
                                    class="text-blue-500 hover:text-blue-700 mr-2">
                                <i class="bi bi-eye"></i> Detail
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    Ditemukan ${users.length} user
                </div>
            `;

            table.innerHTML = html;
        }

        async function viewUserDetail(type, id) {
            try {
                let url, data;
                if (type === 'teacher') {
                    const res = await fetch(`/api/teacher-data/${id}`);
                    data = await res.json();
                } else {
                    // For users table, we'd need another endpoint
                    data = { message: 'Detail user sistem belum tersedia' };
                }

                const modal = new bootstrap.Modal(document.getElementById('userModal'));
                const detail = document.getElementById('userDetail');

                if (type === 'teacher') {
                    detail.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-4">
                            <div><strong>Nama:</strong> ${data.nama || '-'}</div>
                            <div><strong>NIY:</strong> ${data.niy || '-'}</div>
                            <div><strong>Email:</strong> ${data.email || '-'}</div>
                            <div><strong>No WA:</strong> ${data.no_wa || '-'}</div>
                            <div><strong>Jabatan:</strong> ${data.jabatan || '-'}</div>
                            <div><strong>Sebagai:</strong> ${data.sebagai || '-'}</div>
                            <div><strong>Jenjang:</strong> ${data.jenjang || '-'}</div>
                            <div><strong>Status:</strong> ${data.status_aktif || '-'}</div>
                            <div><strong>Unit:</strong> ${data.tenant_id || '-'}</div>
                            <div><strong>TMT:</strong> ${data.tmt || '-'}</div>
                        </div>
                        ${data.alamat ? `<div class="mt-4"><strong>Alamat:</strong><br>${data.alamat}</div>` : ''}
                    `;
                } else {
                    detail.innerHTML = '<p>Detail untuk user sistem belum diimplementasi</p>';
                }

                modal.show();

            } catch (err) {
                console.error('Error loading user detail:', err);
                alert('Gagal memuat detail user');
            }
        }

        // Enter key support
        document.getElementById('searchQuery').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchUsers();
        });

        // Initialize
        loadTenants();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
