<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Guru - YPWI Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1f8a4a', secondary: '#93d5f4', accent: '#eae830', dark: '#0f172a' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="dashboard.html" class="text-white text-xl font-extrabold">YPWI <span class="text-accent">Admin</span></a>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="logout()" class="text-white/80 hover:text-white"><i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-800">Manajemen Guru & Staff</h1>
                <p class="text-gray-500 text-sm">Tambah, Edit, Hapus data guru</p>
            </div>
            <button onclick="showAddModal()" class="bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 flex items-center gap-2">
                <i class="bi bi-plus-circle"></i> Tambah Guru
            </button>
        </div>

        <!-- Filter -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Unit Sekolah</label>
                    <select id="filter-unit" onchange="loadGuru()" class="w-full px-4 py-2 border rounded-lg">
                        <option value="">Semua Unit</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Cari Nama</label>
                    <input type="text" id="search-name" onkeyup="loadGuru()" placeholder="Nama..." class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Sebagai</label>
                    <select id="filter-sebagai" onchange="loadGuru()" class="w-full px-4 py-2 border rounded-lg">
                        <option value="">Semua</option>
                        <option value="Guru">Guru</option>
                        <option value="Admin">Admin</option>
                        <option value="Bendahara">Bendahara</option>
                        <option value="TU">TU</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left font-semibold">No</th>
                            <th class="px-4 py-3 text-left font-semibold">Nama</th>
                            <th class="px-4 py-3 text-left font-semibold">NIY</th>
                            <th class="px-4 py-3 text-left font-semibold">Unit</th>
                            <th class="px-4 py-3 text-left font-semibold">Jabatan</th>
                            <th class="px-4 py-3 text-left font-semibold">Sebagai</th>
                            <th class="px-4 py-3 text-left font-semibold">No. WA</th>
                            <th class="px-4 py-3 text-center font-semibold">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="guru-table">
                        <tr><td colspan="8" class="text-center py-8 text-gray-500">Memuat...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Add/Edit -->
    <div id="guru-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
            <div class="gradient-bg p-6">
                <h2 class="text-xl font-bold text-white" id="modal-title">Tambah Guru</h2>
            </div>
            <form id="guru-form" class="p-6 space-y-4">
                <input type="hidden" id="guru-id">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap</label>
                        <input type="text" id="guru-nama" required class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">NIY</label>
                        <input type="text" id="guru-niy" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">NIK</label>
                        <input type="text" id="guru-nik" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Unit Sekolah</label>
                        <select id="guru-unit" required class="w-full px-4 py-2 border rounded-lg"></select>
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Jabatan</label>
                        <input type="text" id="guru-jabatan" class="w-full px-4 py-2 border rounded-lg" placeholder="Guru, Kepala Sekolah, dll">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Sebagai</label>
                        <select id="guru-sebagai" class="w-full px-4 py-2 border rounded-lg">
                            <option value="Guru">Guru</option>
                            <option value="Admin">Admin</option>
                            <option value="Bendahara">Bendahara</option>
                            <option value="TU">TU</option>
                            <option value="Pimpin">Pimpinan</option>
                        </select>
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">No. WhatsApp</label>
                        <input type="text" id="guru-wa" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                        <input type="email" id="guru-email" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Alamat</label>
                    <textarea id="guru-alamat" rows="2" class="w-full px-4 py-2 border rounded-lg"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold hover:bg-green-700">Simpan</button>
                    <button type="button" onclick="closeModal()" class="px-6 py-3 border rounded-xl font-semibold hover:bg-gray-50">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        // Load units
        async function loadUnits() {
            const res = await fetch('/api/tenants');
            const units = await res.json();
            const selects = ['filter-unit', 'guru-unit'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                if (id === 'guru-unit') {
                    units.forEach(u => sel.innerHTML += `<option value="${u.code}">${u.name}</option>`);
                } else {
                    sel.innerHTML = '<option value="">Semua Unit</option>';
                    units.forEach(u => sel.innerHTML += `<option value="${u.code}">${u.name}</option>`);
                }
            });
        }
        loadUnits();

        // Load guru
        async function loadGuru() {
            const unit = document.getElementById('filter-unit').value;
            const search = document.getElementById('search-name').value;
            const sebagai = document.getElementById('filter-sebagai').value;
            
            let url = '/api/all-teachers?';
            if (unit) url += `unit=${unit}&`;
            if (search) url += `search=${search}&`;
            if (sebagai) url += `sebagai=${sebagai}&`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            const tbody = document.getElementById('guru-table');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">Tidak ada data</td></tr>';
            } else {
                tbody.innerHTML = data.map((g, i) => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-3">${i+1}</td>
                        <td class="px-4 py-3 font-medium">${g.nama || '-'}</td>
                        <td class="px-4 py-3">${g.niy || '-'}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">${g.tenant_id || '-'}</td>
                        <td class="px-4 py-3">${g.jabatan || '-'}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 bg-primary/10 text-primary rounded text-xs">${g.sebagai || 'Guru'}</span></td>
                        <td class="px-4 py-3 text-sm">${g.no_wa || '-'}</td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="editGuru(${g.id})" class="text-blue-500 hover:underline mr-2"><i class="bi bi-pencil"></i></button>
                            <button onclick="deleteGuru(${g.id})" class="text-red-500 hover:underline"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
        }
        loadGuru();

        function showAddModal() {
            document.getElementById('modal-title').innerText = 'Tambah Guru';
            document.getElementById('guru-id').value = '';
            document.getElementById('guru-form').reset();
            document.getElementById('guru-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('guru-modal').classList.add('hidden');
        }

        async function editGuru(id) {
            const res = await fetch('/api/all-teachers');
            const data = await res.json();
            const g = data.find(t => t.id === id);
            if (!g) return;
            
            document.getElementById('modal-title').innerText = 'Edit Guru';
            document.getElementById('guru-id').value = g.id;
            document.getElementById('guru-nama').value = g.nama || '';
            document.getElementById('guru-niy').value = g.niy || '';
            document.getElementById('guru-nik').value = g.nik || '';
            document.getElementById('guru-unit').value = g.tenant_id || '';
            document.getElementById('guru-jabatan').value = g.jabatan || '';
            document.getElementById('guru-sebagai').value = g.sebagai || 'Guru';
            document.getElementById('guru-wa').value = g.no_wa || '';
            document.getElementById('guru-email').value = g.email || '';
            document.getElementById('guru-alamat').value = g.alamat || '';
            
            document.getElementById('guru-modal').classList.remove('hidden');
        }

        document.getElementById('guru-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('guru-id').value;
            const data = {
                nama: document.getElementById('guru-nama').value,
                niy: document.getElementById('guru-niy').value,
                nik: document.getElementById('guru-nik').value,
                tenant_id: document.getElementById('guru-unit').value,
                jabatan: document.getElementById('guru-jabatan').value,
                sebagai: document.getElementById('guru-sebagai').value,
                no_wa: document.getElementById('guru-wa').value,
                email: document.getElementById('guru-email').value,
                alamat: document.getElementById('guru-alamat').value
            };
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/teachers/${id}` : '/api/teachers';
            
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success || result.id) {
                    alert('Data berhasil disimpan!');
                    closeModal();
                    loadGuru();
                } else {
                    alert('Gagal: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        async function deleteGuru(id) {
            if (!confirm('Yakin hapus data guru ini?')) return;
            
            try {
                const res = await fetch(`/api/teachers/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                if (result.success) {
                    alert('Data dihapus!');
                    loadGuru();
                } else {
                    alert('Gagal hapus: ' + (result.error || 'Unknown'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
