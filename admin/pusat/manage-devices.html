<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Device Absensi - Admin YPWI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1f8a4a',
                        secondary: '#93d5f4',
                        accent: '#eae830',
                        dark: '#0f172a',
                        light: '#f8fdff',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        info: '#3b82f6'
                    },
                    fontFamily: {
                        plus: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-active { background-color: #d1fae5; color: #059669; }
        .status-inactive { background-color: #fee2e2; color: #dc2626; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-light via-blue-50 to-green-50">

    <!-- Header -->
    <header class="gradient-bg shadow-xl">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="dashboard.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
                        <i class="bi bi-arrow-left text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white">Kembali ke Dashboard</span>
                </a>
                <div class="flex items-center gap-3">
                    <i class="bi bi-device-hdd-fill text-2xl text-accent"></i>
                    <div>
                        <h1 class="text-xl font-bold text-white">Manajemen Device Absensi</h1>
                        <p class="text-white/80 text-sm">Kelola status device untuk sistem absensi</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-6 py-8">

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                <div class="text-3xl font-bold text-info mb-2" id="total-devices">0</div>
                <div class="text-gray-600">Total Device</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                <div class="text-3xl font-bold text-warning mb-2" id="pending-devices">0</div>
                <div class="text-gray-600">Menunggu Approval</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                <div class="text-3xl font-bold text-success mb-2" id="active-devices">0</div>
                <div class="text-gray-600">Device Aktif</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6 text-center">
                <div class="text-3xl font-bold text-danger mb-2" id="inactive-devices">0</div>
                <div class="text-gray-600">Device Nonaktif</div>
            </div>
        </div>

        <!-- Device List -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-dark flex items-center gap-3">
                    <i class="bi bi-list-ul text-primary"></i>
                    Daftar Device Absensi
                </h2>
                <div class="flex gap-3">
                    <button onclick="showAddDeviceModal()" class="flex items-center gap-2 px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 transition">
                        <i class="bi bi-plus-circle"></i>
                        Tambah Device
                    </button>
                    <button onclick="loadDevices()" class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">
                        <i class="bi bi-arrow-clockwise"></i>
                        Refresh
                    </button>
                </div>
            </div>

            <div id="device-list" class="space-y-4">
                <div class="text-center text-gray-500 py-8">
                    <i class="bi bi-info-circle text-3xl mb-2"></i>
                    <p>Memuat daftar device...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Status Change Modal -->
    <div id="status-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md">
                <div class="text-center">
                    <div id="modal-icon" class="text-5xl mb-4"></div>
                    <h3 id="modal-title" class="text-xl font-bold mb-4"></h3>
                    <p id="modal-message" class="text-gray-600 mb-6"></p>

                    <div class="flex gap-3">
                        <button id="cancel-btn" class="flex-1 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            Batal
                        </button>
                        <button id="confirm-btn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">
                            Konfirmasi
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Device Modal -->
    <div id="add-device-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl p-6 w-full max-w-md">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-dark flex items-center gap-2">
                        <i class="bi bi-plus-circle text-success"></i>
                        Tambah Device Baru
                    </h3>
                    <button onclick="closeAddDeviceModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="bi bi-x-lg text-xl"></i>
                    </button>
                </div>

                <form id="add-device-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-tag mr-2 text-primary"></i>Device ID *
                        </label>
                        <input type="text" id="device-id" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-primary focus:outline-none"
                               placeholder="Masukkan ID device yang unik">
                        <p class="text-xs text-gray-500 mt-1">Setiap device harus memiliki ID yang unik</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-device-hdd mr-2 text-primary"></i>Nama Device *
                        </label>
                        <input type="text" id="device-name" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-primary focus:outline-none"
                               placeholder="Contoh: Device Gerbang Utama">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-geo-alt mr-2 text-primary"></i>Lokasi Device
                        </label>
                        <input type="text" id="device-location"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-primary focus:outline-none"
                               placeholder="Contoh: Gerbang Masuk Sekolah">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-building mr-2 text-primary"></i>Tenant/Sekolah *
                        </label>
                        <select id="device-tenant" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-primary focus:outline-none">
                            <option value="">Pilih Tenant/Sekolah</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-telephone mr-2 text-primary"></i>Nomor Telepon
                        </label>
                        <input type="tel" id="device-phone"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:border-primary focus:outline-none"
                               placeholder="Contoh: 6281234567890">
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="closeAddDeviceModal()"
                                class="flex-1 px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            Batal
                        </button>
                        <button type="submit"
                                class="flex-1 px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 transition">
                            <i class="bi bi-check-circle mr-2"></i>Daftarkan Device
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let pendingAction = null;

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');

            if (!token || role !== 'Admin') {
                window.location.href = '/login.html';
                return false;
            }

            currentUser = { token, role, tenant: localStorage.getItem('tenant') };
            loadDevices();
            return true;
        }

        // Load devices
        async function loadDevices() {
            try {
                const response = await fetch('/api/admin-devices', {
                    headers: { 'Authorization': `Bearer ${currentUser.token}` }
                });

                if (response.status === 403) {
                    showToast('Akses ditolak. Hanya admin yang bisa mengelola device.', 'danger');
                    return;
                }

                const devices = await response.json();
                displayDevices(devices);
                updateStats(devices);
            } catch (error) {
                console.error('Error loading devices:', error);
                showToast('Gagal memuat daftar device', 'danger');
            }
        }

        // Update stats
        function updateStats(devices) {
            const total = devices.length;
            const pending = devices.filter(d => d.status === 'pending').length;
            const active = devices.filter(d => d.status === 'active').length;
            const inactive = devices.filter(d => d.status === 'inactive').length;

            document.getElementById('total-devices').textContent = total;
            document.getElementById('pending-devices').textContent = pending;
            document.getElementById('active-devices').textContent = active;
            document.getElementById('inactive-devices').textContent = inactive;
        }

        // Display devices
        function displayDevices(devices) {
            const container = document.getElementById('device-list');

            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="bi bi-device-hdd text-3xl mb-2"></i>
                        <p>Belum ada device terdaftar</p>
                        <p class="text-sm">Device baru akan muncul setelah didaftarkan melalui halaman pendaftaran</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = devices.map(device => {
                const statusClass = {
                    'pending': 'status-pending',
                    'active': 'status-active',
                    'inactive': 'status-inactive'
                }[device.status] || 'status-inactive';

                const statusText = {
                    'pending': 'Menunggu Approval',
                    'active': 'Aktif',
                    'inactive': 'Nonaktif'
                }[device.status] || 'Unknown';

                return `
                    <div class="bg-gray-50 rounded-xl p-6 border border-gray-200">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <i class="bi bi-device-hdd text-primary text-xl"></i>
                                    <h3 class="font-bold text-dark text-lg">${device.device_name}</h3>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>

                                <p class="text-gray-600 mb-2"><i class="bi bi-geo-alt mr-2"></i>${device.device_location}</p>
                                <p class="text-gray-600 mb-2"><i class="bi bi-building mr-2"></i>${device.tenant_name || device.tenant_id}</p>

                                <div class="flex items-center gap-4 text-sm text-gray-500">
                                    <span><i class="bi bi-calendar mr-1"></i>${new Date(device.created_at).toLocaleDateString('id-ID')}</span>
                                    <span><i class="bi bi-telephone mr-1"></i>${device.phone_number || 'N/A'}</span>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2">
                                ${getActionButtons(device)}
                            </div>
                        </div>

                        <div class="mt-4 p-3 bg-gray-100 rounded-lg">
                            <p class="text-xs text-gray-500 mb-1">Device ID:</p>
                            <code class="text-sm font-mono text-primary break-all">${device.device_id}</code>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Get action buttons based on status
        function getActionButtons(device) {
            const buttons = [];

            if (device.status === 'pending') {
                buttons.push(`<button onclick="changeStatus('${device.device_id}', 'active')" class="px-3 py-1 bg-success text-white text-sm rounded hover:bg-success/90 transition">Aktifkan</button>`);
                buttons.push(`<button onclick="deleteDevice('${device.device_id}')" class="px-3 py-1 bg-danger text-white text-sm rounded hover:bg-danger/90 transition">Hapus</button>`);
            } else if (device.status === 'active') {
                buttons.push(`<button onclick="changeStatus('${device.device_id}', 'inactive')" class="px-3 py-1 bg-warning text-white text-sm rounded hover:bg-warning/90 transition">Nonaktifkan</button>`);
            } else if (device.status === 'inactive') {
                buttons.push(`<button onclick="changeStatus('${device.device_id}', 'active')" class="px-3 py-1 bg-success text-white text-sm rounded hover:bg-success/90 transition">Aktifkan</button>`);
                buttons.push(`<button onclick="changeStatus('${device.device_id}', 'pending')" class="px-3 py-1 bg-info text-white text-sm rounded hover:bg-info/90 transition">Pending</button>`);
                buttons.push(`<button onclick="deleteDevice('${device.device_id}')" class="px-3 py-1 bg-danger text-white text-sm rounded hover:bg-danger/90 transition">Hapus</button>`);
            }

            return buttons.join('');
        }

        // Change device status
        function changeStatus(deviceId, newStatus) {
            const statusText = {
                'pending': 'Pending',
                'active': 'Aktif',
                'inactive': 'Nonaktif'
            }[newStatus];

            pendingAction = { type: 'status', deviceId, newStatus, statusText };
            showStatusModal('change', `Ubah status device menjadi "${statusText}"?`);
        }

        // Delete device
        function deleteDevice(deviceId) {
            pendingAction = { type: 'delete', deviceId };
            showStatusModal('delete', 'Hapus device ini secara permanen?');
        }

        // Show status modal
        function showStatusModal(type, message) {
            const modal = document.getElementById('status-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');

            modal.classList.remove('hidden');

            if (type === 'change') {
                icon.className = 'bi bi-question-circle text-warning';
                title.textContent = 'Konfirmasi Ubah Status';
            } else {
                icon.className = 'bi bi-exclamation-triangle text-danger';
                title.textContent = 'Konfirmasi Hapus Device';
            }

            msg.textContent = message;
        }

        // Modal event listeners
        document.getElementById('cancel-btn').addEventListener('click', () => {
            document.getElementById('status-modal').classList.add('hidden');
            pendingAction = null;
        });

        document.getElementById('confirm-btn').addEventListener('click', async () => {
            if (!pendingAction) return;

            try {
                let response;

                if (pendingAction.type === 'status') {
                    response = await fetch(`/api/admin-devices/${pendingAction.deviceId}/status`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentUser.token}`
                        },
                        body: JSON.stringify({ status: pendingAction.newStatus })
                    });
                } else if (pendingAction.type === 'delete') {
                    response = await fetch(`/api/admin-devices/${pendingAction.deviceId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${currentUser.token}` }
                    });
                }

                const result = await response.json();

                if (result.success) {
                    showToast(result.message, 'success');
                    loadDevices();
                } else {
                    showToast(result.error || 'Operasi gagal', 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Terjadi kesalahan koneksi', 'danger');
            }

            document.getElementById('status-modal').classList.add('hidden');
            pendingAction = null;
        });

        // Toast notification
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast-notification fixed top-4 right-4 bg-${type === 'success' ? 'green' : type === 'danger' ? 'red' : 'blue'}-500 text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 5000);
        }

        // Show add device modal
        function showAddDeviceModal() {
            loadTenants();
            document.getElementById('add-device-modal').classList.remove('hidden');
        }

        // Close add device modal
        function closeAddDeviceModal() {
            document.getElementById('add-device-modal').classList.add('hidden');
            document.getElementById('add-device-form').reset();
        }

        // Load tenants for dropdown
        async function loadTenants() {
            try {
                const response = await fetch('/api/tenants', {
                    headers: { 'Authorization': `Bearer ${currentUser.token}` }
                });
                const tenants = await response.json();

                const select = document.getElementById('device-tenant');
                select.innerHTML = '<option value="">Pilih Tenant/Sekolah</option>';

                tenants.forEach(tenant => {
                    const option = document.createElement('option');
                    option.value = tenant.code || tenant.tenant_id;
                    option.textContent = tenant.name || tenant.code;
                    select.appendChild(option);
                });

                // For school admins, pre-select their tenant
                if (currentUser.tenant !== 'YPWILUTIM') {
                    select.value = currentUser.tenant;
                    select.disabled = true;
                }
            } catch (error) {
                console.error('Error loading tenants:', error);
                showToast('Gagal memuat daftar tenant', 'danger');
            }
        }

        // Handle add device form submission
        document.getElementById('add-device-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const deviceId = document.getElementById('device-id').value.trim();
            const deviceName = document.getElementById('device-name').value.trim();
            const deviceLocation = document.getElementById('device-location').value.trim();
            const tenantId = document.getElementById('device-tenant').value;
            const phoneNumber = document.getElementById('device-phone').value.trim();

            if (!deviceId || !deviceName || !tenantId) {
                showToast('Device ID, Nama Device, dan Tenant wajib diisi', 'danger');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Mendaftarkan...';

            try {
                const response = await fetch('/api/admin-devices', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({
                        device_id: deviceId,
                        device_name: deviceName,
                        device_location: deviceLocation || null,
                        phone_number: phoneNumber || null,
                        tenant_id: tenantId
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showToast(result.message, 'success');
                    closeAddDeviceModal();
                    loadDevices();
                } else {
                    showToast(result.error || 'Gagal mendaftarkan device', 'danger');
                }
            } catch (error) {
                console.error('Error adding device:', error);
                showToast('Terjadi kesalahan koneksi', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Initialize
        window.onload = checkAuth;
    </script>

</body>
</html>
