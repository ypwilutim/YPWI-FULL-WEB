<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Lihat Semua User</title>
</head>
<body>
    <h1>Debug - Semua User di Database</h1>

    <h2>Teachers:</h2>
    <div id="teachers"></div>

    <h2>Users:</h2>
    <div id="users"></div>

    <h2>Students:</h2>
    <div id="students"></div>

    <script>
        // Load teachers
        fetch('/api/all-teachers')
            .then(r => r.json())
            .then(data => {
                document.getElementById('teachers').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            });

        // Load users (if endpoint exists)
        fetch('/api/search-users?query=')
            .then(r => r.ok ? r.json() : Promise.resolve([]))
            .then(data => {
                document.getElementById('users').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(() => {
                document.getElementById('users').innerHTML = '<p>Endpoint not available</p>';
            });

        // Load students
        fetch('/api/students')
            .then(r => r.ok ? r.json() : Promise.resolve([]))
            .then(data => {
                document.getElementById('students').innerHTML = '<pre>' + JSON.stringify(data.slice(0, 5), null, 2) + '</pre>';
            })
            .catch(() => {
                document.getElementById('students').innerHTML = '<p>Endpoint not available or no auth</p>';
            });
    </script>
</body>
</html>
