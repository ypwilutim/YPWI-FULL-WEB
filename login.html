<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YPWI Luwu Timur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1f8a4a',
                        secondary: '#93d5f4',
                        accent: '#eae830',
                        dark: '#0f172a',
                        light: '#f8fdff'
                    },
                    fontFamily: {
                        plus: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
        // Hilangkan warning produksi Tailwind CDN
        window.tailwind = window.tailwind || {};
        window.tailwind.config = window.tailwind.config || {};
        window.tailwind.config.disableProductionWarning = true;
    </script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1f8a4a 0%, #93d5f4 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); }
        .btn-gradient { background: linear-gradient(135deg, #1f8a4a 0%, #22c55e 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(31, 138, 74, 0.3); }
        .input-focus:focus { border-color: #1f8a4a; box-shadow: 0 0 0 3px rgba(31, 138, 74, 0.1); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float-animation { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-light via-blue-50 to-green-50">

    <!-- Navbar -->
    <nav class="gradient-bg shadow-xl">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/YPWI LOGO HITAM.png" alt="YPWI" height="20" class="bg-white rounded-lg p-1">
                    <span class="text-2xl font-extrabold text-white">YPWI <span class="text-accent">LUTIM</span></span>
                </a>
                <div class="flex items-center gap-4">
                    <button onclick="window.open('progress.html', '_blank')" class="flex items-center gap-2 px-5 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-semibold transition">
                        <i class="bi bi-bar-chart-fill"></i>
                        <span class="hidden sm:inline">Progress Data</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="min-h-[calc(100vh-80px)] flex items-center justify-center p-6">
        <div class="w-full max-w-md">
            
            <!-- Hero Icon -->
            <div class="text-center mb-8 float-animation">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl gradient-bg flex items-center justify-center shadow-xl">
                    <i class="bi bi-person-lock text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-dark">Selamat Datang</h1>
                <p class="text-gray-600 mt-2">Masuk untuk mengakses sistem YPWI</p>
            </div>

            <!-- Login Card -->
            <div class="glass rounded-3xl shadow-2xl p-8 border border-white/50">
                
                <form id="loginForm" class="space-y-5">
                    
                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-person mr-2 text-primary"></i>Username
                        </label>
                        <input type="text" id="username" name="username" required 
                            class="w-full px-4 py-4 rounded-xl border-2 border-gray-200 bg-white input-focus outline-none transition text-gray-700 font-medium"
                            placeholder="Masukkan username atau email Anda">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="bi bi-lock mr-2 text-primary"></i>Password
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required 
                                class="w-full px-4 py-4 pr-12 rounded-xl border-2 border-gray-200 bg-white input-focus outline-none transition text-gray-700 font-medium"
                                placeholder="Masukkan password Anda">
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full btn-gradient py-4 rounded-xl text-white font-bold text-lg shadow-lg">
                        <i class="bi bi-box-arrow-in-right mr-2"></i> Masuk
                    </button>

                </form>

                <!-- Footer Links -->
                <div class="mt-6 pt-6 border-t border-gray-100 text-center">
                    <a href="registrasi.html" class="text-primary font-semibold hover:text-primary/80 transition">
                        <i class="bi bi-person-plus mr-2"></i>Registrasi Guru Baru
                    </a>
                </div>

            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl p-4 border-l-4 border-primary flex items-center gap-3">
            <i class="bi bi-info-circle text-primary text-xl"></i>
            <span id="toastMessage" class="font-medium text-gray-700"></span>
        </div>
    </div>

    <script>
        // Ensure login button is enabled on page load
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.querySelector('button[type="submit"]');
            if (loginBtn) {
                loginBtn.disabled = false;
                console.log('✅ Login button enabled');
            } else {
                console.error('❌ Login button not found');
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), duration);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            showToast('Logging in...');

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.incomplete) {
                    showToast('Profil Anda belum lengkap. Mengalihkan ke halaman lengkapi profil...');
                    setTimeout(() => {
                        window.location.href = `complete-profile.html?teacherId=${data.teacherId}`;
                    }, 1500);
                    return;
                }
                if (data.error) {
                    showToast(data.error);
                    return;
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('sebagai', data.sebagai || '');
                localStorage.setItem('tenant', data.tenant || '');
                localStorage.setItem('userName', username);

                showToast('Login berhasil! Mengalihkan ke dashboard...');
                
                // Redirect based on role and tenant
                // Store user data and token
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('role', data.role);
                localStorage.setItem('tenant', data.tenant);

                setTimeout(() => {
                    // Use the route provided by server
                    const route = data.route;
                    console.log('Login routing:', {
                        role: data.role,
                        tenant: data.tenant,
                        route: route
                    });

                    window.location.href = route;
                }, 1000);
            })
            .catch(error => {
                showToast('Gagal terhubung ke server. Pastikan server berjalan di port 3001.');
            });
        });

    </script>

</body>
</html>
