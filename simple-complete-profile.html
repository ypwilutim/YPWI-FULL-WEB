<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - YPWI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <h2 class="text-3xl font-extrabold text-gray-900">Complete Profile</h2>
                <p class="mt-2 text-sm text-gray-600">Loading teacher data...</p>
            </div>

            <div id="loading" class="animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mx-auto"></div>

            <div id="form-container" class="hidden">
                <form id="completeProfileForm" enctype="multipart/form-data" class="mt-8 space-y-6">
                    <input type="hidden" name="teacherId" id="teacherId">

                    <div class="space-y-4">
                        <div>
                            <label for="nama" class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                            <input type="text" id="nama" name="nama" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary">
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="email" name="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary">
                        </div>

                        <div>
                            <label for="no_wa" class="block text-sm font-medium text-gray-700">Nomor WhatsApp</label>
                            <input type="tel" id="no_wa" name="no_wa" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary">
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                            <i class="bi bi-check-circle me-2"></i>Simpan Data
                        </button>
                    </div>
                </form>
            </div>

            <div id="error" class="hidden text-center text-red-600">
                <p id="error-message"></p>
            </div>
        </div>
    </div>

    <script>
        console.log('Simple complete-profile page loaded');

        // Simple toast function
        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-green-100 border-green-500 text-green-700',
                error: 'bg-red-100 border-red-500 text-red-700',
                info: 'bg-blue-100 border-blue-500 text-blue-700'
            };

            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-4 py-2 border-l-4 rounded shadow-lg ${colors[type]} z-50`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Initialize form data
        function initializeFormData() {
            console.log('initializeFormData called');
            const urlParams = new URLSearchParams(window.location.search);
            const teacherId = urlParams.get('teacherId');
            console.log('URL teacherId:', teacherId);
            return teacherId;
        }

        // Load teacher data
        async function loadTeacherData(teacherId) {
            try {
                console.log('Fetching teacher data for ID:', teacherId);
                const response = await fetch('/api/teacher-data/' + teacherId);
                const data = await response.json();

                console.log('API Response:', data);

                if (data.error) {
                    throw new Error(data.error);
                }

                // Fill form fields
                Object.keys(data).forEach(key => {
                    const element = document.getElementById(key);
                    if (element) {
                        let value = data[key];
                        if (value && (key === 'tanggal_lahir' || key === 'tmt')) {
                            value = value.split('T')[0];
                        }
                        element.value = value || '';
                        console.log(`Set ${key} to:`, value);
                    }
                });

                // Show form
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('form-container').classList.remove('hidden');

                showToast('Data berhasil dimuat', 'success');

            } catch (error) {
                console.error('Error loading teacher data:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error-message').textContent = 'Gagal memuat data: ' + error.message;
                showToast('Gagal memuat data guru', 'error');
            }
        }

        // Handle form submission
        async function submitForm(event) {
            event.preventDefault();

            const teacherId = document.getElementById('teacherId').value;
            if (!teacherId) {
                showToast('Teacher ID tidak ditemukan', 'error');
                return;
            }

            try {
                const form = document.getElementById('completeProfileForm');
                const formData = new FormData(form);

                console.log('Submitting form data...');
                const response = await fetch('/complete-profile', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Submit result:', result);

                if (result.success) {
                    showToast('Data berhasil disimpan!', 'success');
                    setTimeout(() => {
                        window.location.href = '/guru/index.html';
                    }, 2000);
                } else {
                    showToast(result.message || 'Terjadi kesalahan saat menyimpan data.', 'error');
                }

            } catch (error) {
                console.error('Submit error:', error);
                showToast('Terjadi kesalahan: ' + error.message, 'error');
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded fired');

            const teacherId = initializeFormData();
            console.log('Teacher ID from initializeFormData:', teacherId);

            if (!teacherId) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error-message').textContent = 'Teacher ID tidak ditemukan di URL';
                showToast('Teacher ID tidak ditemukan', 'error');
                return;
            }

            // Set teacher ID in form
            document.getElementById('teacherId').value = teacherId;

            // Load teacher data
            loadTeacherData(teacherId);

            // Add form submit handler
            document.getElementById('completeProfileForm').addEventListener('submit', submitForm);
        });
    </script>
</body>
</html>
