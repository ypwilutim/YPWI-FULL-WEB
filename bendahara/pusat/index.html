<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPWI Bendahara Pusat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f9ff; }
        .active-link { background: #1f8a4a; color: white; border-radius: 1rem; }
        .nav-item:not(.active-link):hover { background-color: #f9fafb; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(31, 138, 74, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-72 bg-white border-r border-gray-100 flex flex-col sticky top-0 h-screen z-50 hidden md:block relative">
        <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 text-gray-600 hover:text-gray-800 z-10"><i class="bi bi-x-lg text-xl"></i></button>
        <div class="p-8 border-b border-gray-50 text-center">
            <img src="../../assets/images/YPWI LOGO HITAM.png" alt="YPWI" height="35" class="mx-auto mb-2">
            <h1 class="text-xl font-black text-[#1f8a4a]">YPWI <span class="text-[#93d5f4]">KEUANGAN</span></h1>
            <p class="text-[10px] text-gray-400 font-bold tracking-[0.2em]">PUSAT</p>
        </div>

        <nav class="flex-1 p-6 space-y-6 overflow-y-auto">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 px-2">Keuangan</p>
                <div class="space-y-1">
                    <button onclick="renderRoute('overview')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-grid-1x2-fill"></i> Overview
                    </button>
                    <button onclick="renderRoute('gaji')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-cash-stack"></i> Pembayaran Gaji
                    </button>
                    <button onclick="renderRoute('spp')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-bank"></i> Tagihan SPP
                    </button>
                    <button onclick="renderRoute('laporan')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-file-earmark-bar-graph"></i> Laporan Keuangan
                    </button>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 px-2">Master Data</p>
                <div class="space-y-1">
                    <button onclick="renderRoute('progress')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-bar-chart-fill"></i> Progress Data
                    </button>
                    <button onclick="renderRoute('sekolah')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-building"></i> Data Sekolah
                    </button>
                    <button onclick="renderRoute('rekap')" class="nav-item w-full flex items-center gap-3 p-3 text-sm font-semibold text-gray-600 hover:bg-gray-50 rounded-xl transition">
                        <i class="bi bi-clipboard-data"></i> Rekapitulasi
                    </button>
                </div>
            </div>
        </nav>

        <div class="p-6 bg-gray-50 m-4 rounded-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center text-white font-bold">B</div>
                <div class="overflow-hidden">
                    <p class="text-xs font-bold text-gray-800 truncate">Bendahara Pusat</p>
                    <p class="text-[10px] text-gray-400">YPWI System</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 p-6 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600"><i class="bi bi-list"></i></button>
                <h2 id="page-title" class="text-xl font-extrabold text-gray-800">Bendahara Pusat</h2>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-gray-400 hover:text-gray-600"><i class="bi bi-bell"></i></button>
                <button onclick="logout()" class="text-gray-400 hover:text-gray-600"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </header>

        <div id="app-viewport" class="p-8 overflow-y-auto max-h-[calc(100vh-80px)]"></div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; }

        function renderRoute(route) {
            const viewport = document.getElementById('app-viewport');
            const title = document.getElementById('page-title');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-link', 'text-white'));
            const activeBtn = document.querySelector(`button[onclick="renderRoute('${route}')"]`);
            if (activeBtn) activeBtn.classList.add('active-link', 'text-white');

            let html = '';
            switch(route) {
                case 'overview':
                    title.innerText = "Overview Keuangan";
                    html = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="md:col-span-2 space-y-8">
                                <div class="bg-gradient-to-r from-green-600 to-green-800 p-10 rounded-[3rem] text-white card-shadow">
                                    <h1 class="text-3xl font-black mb-2 italic">Dashboard Keuangan</h1>
                                    <p class="opacity-80 text-sm mb-6">Kelola keuangan YPWI dengan transparan.</p>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-8">
                            <div class="bg-white p-6 rounded-2xl card-shadow">
                                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-4">
                                    <i class="bi bi-cash text-green-600 text-xl"></i>
                                </div>
                                <p class="text-2xl font-black text-gray-800">Rp 0</p>
                                <p class="text-sm text-gray-500">Total Pendapatan</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl card-shadow">
                                <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center mb-4">
                                    <i class="bi bi-credit-card text-red-600 text-xl"></i>
                                </div>
                                <p class="text-2xl font-black text-gray-800">Rp 0</p>
                                <p class="text-sm text-gray-500">Total Pengeluaran</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl card-shadow">
                                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mb-4">
                                    <i class="bi bi-people text-blue-600 text-xl"></i>
                                </div>
                                <p class="text-2xl font-black text-gray-800">0</p>
                                <p class="text-sm text-gray-500">Pegawai</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl card-shadow">
                                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center mb-4">
                                    <i class="bi bi-school text-purple-600 text-xl"></i>
                                </div>
                                <p class="text-2xl font-black text-gray-800">0</p>
                                <p class="text-sm text-gray-500">Sekolah</p>
                            </div>
                        </div>`;
                    break;
                case 'gaji':
                    title.innerText = "Pembayaran Gaji";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Pembayaran Gaji Pegawai</h3><div class="overflow-x-auto"><table class="w-full text-left"><thead><tr class="border-b"><th class="p-3">Nama</th><th class="p-3">Jabatan</th><th class="p-3">Gaji Pokok</th><th class="p-3">Tunjangan</th><th class="p-3">Total</th><th class="p-3">Status</th></tr></thead><tbody><tr><td colspan="6" class="p-4 text-center text-gray-500">Belum ada data</td></tr></tbody></table></div></div>`;
                    break;
                case 'spp':
                    title.innerText = "Tagihan SPP";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Tagihan SPP Siswa</h3><div class="overflow-x-auto"><table class="w-full text-left"><thead><tr class="border-b"><th class="p-3">NIS</th><th class="p-3">Nama</th><th class="p-3">Kelas</th><th class="p-3">Sekolah</th><th class="p-3">Tagihan</th><th class="p-3">Status</th></tr></thead><tbody><tr><td colspan="6" class="p-4 text-center text-gray-500">Belum ada data</td></tr></tbody></table></div></div>`;
                    break;
                case 'laporan':
                    title.innerText = "Laporan Keuangan";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Laporan Keuangan</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="border rounded-xl p-4"><h4 class="font-bold mb-2">Laporan Pendapatan</h4><button class="bg-green-600 text-white px-4 py-2 rounded-lg">Export PDF</button></div><div class="border rounded-xl p-4"><h4 class="font-bold mb-2">Laporan Pengeluaran</h4><button class="bg-green-600 text-white px-4 py-2 rounded-lg">Export PDF</button></div></div></div>`;
                    break;
                case 'sekolah':
                    title.innerText = "Data Sekolah";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Data Sekolah</h3><p class="text-gray-500">Daftar sekolah akan ditampilkan di sini.</p></div>`;
                    break;
                case 'rekap':
                    title.innerText = "Rekapitulasi";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Rekapitulasi Data</h3><p class="text-gray-500">Rekapitulasi keuangan akan ditampilkan di sini.</p></div>`;
                    break;
                case 'progress':
                    title.innerText = "Progress Data";
                    html = `<div class="bg-white rounded-3xl card-shadow p-8"><h3 class="text-xl font-bold mb-4">Progress Pengisian Data Guru</h3><div class="text-center py-8"><p class="text-gray-500 mb-4">Klik tombol di bawah untuk melihat progress data guru per unit</p><a href="../../progress.html" target="_blank" class="bg-green-600 text-white px-6 py-3 rounded-xl inline-block font-bold hover:bg-green-700"><i class="bi bi-bar-chart-fill me-2"></i>Buka Progress Data</a></div></div>`;
                    break;
            }
            viewport.innerHTML = html;
        }

        function toggleSidebar() { document.querySelector('aside').classList.toggle('hidden'); }
        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }

        renderRoute('overview');
    </script>
</body>
</html>
