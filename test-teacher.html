<!DOCTYPE html>
<html>
<head>
    <title>Test Teacher Data</title>
</head>
<body>
    <h1>Testing Teacher Data API</h1>
    <div id="result"></div>

    <script>
        // Test teacher data API
        fetch('/api/teacher-data/995')
            .then(res => res.json())
            .then(data => {
                console.log('Teacher data:', data);
                document.getElementById('result').innerHTML = `
                    <h2>Teacher Data for ID 995:</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            })
            .catch(err => {
                console.error('Error:', err);
                document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
            });
    </script>
</body>
</html>
